name: LiquidGov Repository Health
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  health-check:
    name: Autonomous Health Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run protocol
      - run: npm test
